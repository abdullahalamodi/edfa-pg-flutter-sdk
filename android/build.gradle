// https://jitpack.io/docs/ANDROID/#examples
group 'com.edfapg.flutter.sdk'
version '1.0.0'

buildscript {
    ext.kotlin_version = '1.8.0'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.2.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

def getPgSdkVersion() {
    return "2.1.9+"
}


def root = rootProject
android {
    compileSdk 36
    namespace 'com.edfapg.flutter.sdk'

    defaultConfig {
        minSdk 24
        targetSdk 36

        aarMetadata {
            minCompileSdk = 16
        }

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    buildFeatures {
        viewBinding true
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdkVersion 21
    }
}

configurations {
    // 1. Define a custom configuration for "bleeding-edge" dependencies
    frequentUpdate

    // 2. Make standard implementation extend it so these libs are on the classpath
    implementation.extendsFrom frequentUpdate
}

configurations.frequentUpdate {
    resolutionStrategy {
        // 3. Force check for dynamic versions (e.g., 2.1.+) every time
        cacheDynamicVersionsFor 0, 'seconds'

        // 4. Force check for SNAPSHOT versions every time (optional but recommended)
        cacheChangingModulesFor 0, 'seconds'
    }
}



dependencies {
    frequentUpdate "com.github.edfapay:edfa-pg-android-sdk:${getPgSdkVersion()}"
//        implementation project(path: ':edfa-pg-sdk') // Local Module
    implementation 'com.google.code.gson:gson:2.9.0'
}